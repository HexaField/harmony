name: CI

on:
  pull_request:
    branches: [main, dev, staging]
  push:
    branches: [dev]

jobs:
  test:
    if: false  # DISABLED — re-enable when deploying to dev
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Type check
        run: pnpm run check

      - name: Lint
        run: npx oxlint

      - name: Build
        run: pnpm run build

      - name: Unit tests
        run: npx vitest run

      - name: Server dry-run
        run: node scripts/dry-run-server.mjs --verbose
        timeout-minutes: 5

  playwright:
    if: false  # DISABLED — enable when Discord test credentials are in CI secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          DISCORD_CLIENT_ID: ${{ secrets.DISCORD_CLIENT_ID }}
          DISCORD_CLIENT_SECRET: ${{ secrets.DISCORD_CLIENT_SECRET }}
          TEST_DISCORD_TOKEN: ${{ secrets.TEST_DISCORD_TOKEN }}
          TEST_DISCORD_TARGET_ID: ${{ secrets.TEST_DISCORD_TARGET_ID }}
