name = "harmony-cloud"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# CF Realtime SFU credentials — set via `wrangler secret put` for production
[vars]
CALLS_APP_ID = ""
CALLS_APP_SECRET = ""

[durable_objects]
bindings = [
  { name = "COMMUNITY", class_name = "CommunityDurableObject" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CommunityDurableObject"]

# ── Dev ──────────────────────────────────────────────

[env.dev]
name = "harmony-cloud-dev"

[env.dev.vars]
CALLS_APP_ID = ""
CALLS_APP_SECRET = ""

[[env.dev.d1_databases]]
binding = "DB"
database_name = "harmony-instances-dev"
database_id = "REPLACE_WITH_DEV_D1_ID"

[[env.dev.r2_buckets]]
binding = "MEDIA"
bucket_name = "harmony-media-dev"

# ── Staging ──────────────────────────────────────────

[env.staging]
name = "harmony-cloud-staging"

[env.staging.vars]
CALLS_APP_ID = ""
CALLS_APP_SECRET = ""

[[env.staging.d1_databases]]
binding = "DB"
database_name = "harmony-instances-staging"
database_id = "REPLACE_WITH_STAGING_D1_ID"

[[env.staging.r2_buckets]]
binding = "MEDIA"
bucket_name = "harmony-media-staging"

# ── Production ───────────────────────────────────────

[env.production]
name = "harmony-cloud"

[env.production.vars]
CALLS_APP_ID = ""
CALLS_APP_SECRET = ""

[[env.production.d1_databases]]
binding = "DB"
database_name = "harmony-instances"
database_id = "REPLACE_WITH_PROD_D1_ID"

[[env.production.r2_buckets]]
binding = "MEDIA"
bucket_name = "harmony-media"
