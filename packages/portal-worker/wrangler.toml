name = "harmony-portal"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "harmony-portal"
database_id = "REPLACE_WITH_D1_ID"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "harmony-portal-media"

[[kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_WITH_KV_ID"

# ── Dev ──────────────────────────────────────────────

[env.dev]
name = "harmony-portal-dev"

[[env.dev.d1_databases]]
binding = "DB"
database_name = "harmony-portal-dev"
database_id = "REPLACE_WITH_DEV_D1_ID"

[[env.dev.r2_buckets]]
binding = "MEDIA"
bucket_name = "harmony-portal-media-dev"

[[env.dev.kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_WITH_DEV_KV_ID"

# ── Staging ──────────────────────────────────────────

[env.staging]
name = "harmony-portal-staging"

[[env.staging.d1_databases]]
binding = "DB"
database_name = "harmony-portal-staging"
database_id = "REPLACE_WITH_STAGING_D1_ID"

[[env.staging.r2_buckets]]
binding = "MEDIA"
bucket_name = "harmony-portal-media-staging"

[[env.staging.kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_WITH_STAGING_KV_ID"

# ── Production ───────────────────────────────────────

[env.production]
name = "harmony-portal"

[[env.production.d1_databases]]
binding = "DB"
database_name = "harmony-portal"
database_id = "REPLACE_WITH_PROD_D1_ID"

[[env.production.r2_buckets]]
binding = "MEDIA"
bucket_name = "harmony-portal-media"

[[env.production.kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_WITH_PROD_KV_ID"
