appId: chat.harmony.app
productName: Harmony
copyright: Copyright © 2026 Harmony

directories:
  output: dist-electron
  buildResources: build

files:
  - "dist/main.mjs"
  - "bin/preload.js"
  - "package.json"
  - "!**/*.spec.*"
  - "!**/*.test.*"

extraResources:
  - from: "../ui-app/dist"
    to: "ui"
    filter:
      - "**/*"

extraMetadata:
  main: dist/main.mjs

nodeGypRebuild: false
npmRebuild: true

asarUnpack:
  - "node_modules/mediasoup/**/*"
  - "node_modules/better-sqlite3/**/*"

mac:
  category: public.app-category.social-networking
  target:
    - target: dmg
      arch: [arm64]
    - target: zip
      arch: [arm64]
  icon: build/icon.icns
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist

dmg:
  artifactName: "Harmony-${version}.${ext}"

win:
  target:
    - target: nsis
      arch: [x64, arm64]
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  artifactName: "Harmony-Setup-${version}.${ext}"

linux:
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64, arm64]
  category: Network;Chat;InstantMessaging
  icon: build/icons

appImage:
  artifactName: "Harmony-${version}.${ext}"

deb:
  artifactName: "harmony_${version}_${arch}.${ext}"
